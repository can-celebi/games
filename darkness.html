<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Darkness</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
            cursor: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* UI Overlay for Energy */
        #ui-layer {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
            text-align: center;
            pointer-events: none;
            width: 80%;
            max-width: 600px;
        }

        #energy-bar-container {
            width: 100%;
            height: 30px;
            background: rgba(20, 20, 20, 0.9);
            border: 3px solid #777;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 10px;
            box-shadow: 0 0 20px rgba(255, 140, 0, 0.2);
            display: block;
        }

        #energy-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff4500, #ff8c00, #ffd700);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
            transition: width 0.1s linear;
        }

        #status-text {
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 0 2px 8px rgba(0,0,0,1);
            letter-spacing: 2px;
            font-family: 'Courier New', monospace;
        }

        #fog-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            pointer-events: none;
        }

        /* Win overlay */
        #win-overlay {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 300;
            background: white;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
            cursor: default;
        }

        #win-overlay.show {
            display: flex;
        }

        #win-overlay h1 {
            font-size: 3rem;
            color: #2c3e50;
            font-weight: 700;
        }

        #win-overlay .next-btn {
            padding: 14px 48px;
            font-size: 1.2rem;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #win-overlay .next-btn:hover {
            background: #2980b9;
        }
    </style>
</head>
<body>

    <div id="game-container"></div>

    <div id="ui-layer">
        <div id="status-text">Chase the Light to Charge Lantern</div>
        <div id="energy-bar-container">
            <div id="energy-fill"></div>
        </div>
    </div>

    <canvas id="fog-canvas"></canvas>

    <div id="win-overlay">
        <h1>Lantern Charged!</h1>
        <button class="next-btn" onclick="window.location.href='index.html'">Next</button>
    </div>

    <script>
        const canvas = document.getElementById('fog-canvas');
        const ctx = canvas.getContext('2d');
        const energyFill = document.getElementById('energy-fill');
        const statusText = document.getElementById('status-text');
        const uiLayer = document.getElementById('ui-layer');
        const winOverlay = document.getElementById('win-overlay');

        let gameState = 'CHASING';
        let energy = 0;
        const ENERGY_MAX = 100;
        const CHARGE_RATE = 0.5;

        let flashAlpha = 0;

        const FLY_SPEED = 4;
        const FLEE_RADIUS = 200;
        const WANDER_STRENGTH = 0.5;

        // Lantern Glow
        const lanternCanvas = document.createElement('canvas');
        lanternCanvas.width = 100;
        lanternCanvas.height = 100;
        const lCtx = lanternCanvas.getContext('2d');
        const lGrad = lCtx.createRadialGradient(50, 50, 5, 50, 50, 50);
        lGrad.addColorStop(0, 'rgba(255, 200, 50, 1)');
        lGrad.addColorStop(0.4, 'rgba(255, 140, 0, 0.4)');
        lGrad.addColorStop(1, 'rgba(255, 140, 0, 0)');
        lCtx.fillStyle = lGrad;
        lCtx.fillRect(0, 0, 100, 100);

        let width, height;
        let mouseX = -1000, mouseY = -1000;
        let fly = { x: 0, y: 0, vx: 0, vy: 0 };

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            if (fly.x === 0) { fly.x = width / 2; fly.y = height / 2; }
        }

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        window.addEventListener('resize', resize);
        resize();

        function updateFirefly() {
            const dx = mouseX - fly.x;
            const dy = mouseY - fly.y;
            const dist = Math.hypot(dx, dy);

            if (dist < FLEE_RADIUS) {
                fly.vx -= (dx / dist) * 0.5;
                fly.vy -= (dy / dist) * 0.5;
            }

            fly.vx += (Math.random() - 0.5) * WANDER_STRENGTH;
            fly.vy += (Math.random() - 0.5) * WANDER_STRENGTH;

            fly.vx += (width / 2 - fly.x) * 0.0005;
            fly.vy += (height / 2 - fly.y) * 0.0005;

            const speed = Math.hypot(fly.vx, fly.vy);
            if (speed > FLY_SPEED) {
                fly.vx = (fly.vx / speed) * FLY_SPEED;
                fly.vy = (fly.vy / speed) * FLY_SPEED;
            }

            fly.x += fly.vx;
            fly.y += fly.vy;

            if (fly.x < 50) fly.vx = Math.abs(fly.vx);
            if (fly.x > width - 50) fly.vx = -Math.abs(fly.vx);
            if (fly.y < 50) fly.vy = Math.abs(fly.vy);
            if (fly.y > height - 50) fly.vy = -Math.abs(fly.vy);

            if (dist < 60) {
                energy += CHARGE_RATE;
                if (energy >= ENERGY_MAX) {
                    energy = ENERGY_MAX;
                    winGame();
                }
            }
            energyFill.style.width = energy + "%";
        }

        function winGame() {
            gameState = 'WON';
            flashAlpha = 1.0;

            uiLayer.style.transition = 'opacity 0.8s';
            uiLayer.style.opacity = '0';

            setTimeout(() => {
                winOverlay.classList.add('show');
            }, 1200);
        }

        function animate() {
            const now = Date.now();

            if (gameState === 'CHASING') {
                updateFirefly();

                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, width, height);

                // Firefly
                const pulse = Math.sin(now * 0.01) * 5 + 15;
                const flyGrad = ctx.createRadialGradient(fly.x, fly.y, 2, fly.x, fly.y, pulse);
                flyGrad.addColorStop(0, 'white');
                flyGrad.addColorStop(0.4, 'cyan');
                flyGrad.addColorStop(1, 'transparent');

                ctx.fillStyle = flyGrad;
                ctx.beginPath();
                ctx.arc(fly.x, fly.y, pulse, 0, Math.PI * 2);
                ctx.fill();

                // Player Lantern
                ctx.globalCompositeOperation = 'screen';
                ctx.drawImage(lanternCanvas, mouseX - 50, mouseY - 50);
            }

            // Flash to white on win
            if (flashAlpha > 0) {
                ctx.globalCompositeOperation = 'source-over';
                ctx.fillStyle = `rgba(255, 255, 255, ${flashAlpha})`;
                ctx.fillRect(0, 0, width, height);
                flashAlpha -= 0.015;
                if (flashAlpha < 0) flashAlpha = 0;
            }

            if (gameState !== 'WON') {
                requestAnimationFrame(animate);
            } else if (flashAlpha > 0) {
                requestAnimationFrame(animate);
            }
        }

        animate();
    </script>
</body>
</html>
