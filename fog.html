<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foggy Question Demo</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      width: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000000;
      color: #f5f5f5;
    }

    .fog-container {
      position: relative;
      height: 100vh;
      width: 100%;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .question-box {
      position: relative;
      z-index: 1;
      max-width: 720px;
      width: 100%;
      padding: 24px 28px;
      border-radius: 16px;
      background: #000000;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.7);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .question-title {
      font-size: 1.3rem;
      margin-bottom: 16px;
    }

    .answers {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .answer-option {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 8px 10px;
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.02);
      cursor: pointer;
    }

    .answer-option input[type="radio"] {
      margin-top: 3px;
    }

    #fog-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10; /* make sure fog is ABOVE the question box */
    }
  </style>
</head>
<body>
  <div id="fog-container" class="fog-container">
    <div class="question-box">
      <h2 class="question-title">
        Please select the option that says "Purple star" below.
      </h2>
      <div class="answers">
        <label class="answer-option">
          <input type="radio" name="choice" value="A" />
          Red star
        </label>
        <label class="answer-option">
          <input type="radio" name="choice" value="B" />
          Purple star
        </label>
        <label class="answer-option">
          <input type="radio" name="choice" value="C" />
         Green star
        </label>
      </div>
    </div>
    <canvas id="fog-canvas"></canvas>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('fog-container');
      const canvas = document.getElementById('fog-canvas');
      const ctx = canvas.getContext('2d');

      let width = 0;
      let height = 0;
      let mouseX = 0;
      let mouseY = 0;
      let hasMouse = false;

      function resizeCanvas() {
        const rect = container.getBoundingClientRect();
        width = rect.width;
        height = rect.height;

        const dpr = window.devicePixelRatio || 1;
        canvas.width = width * dpr;
        canvas.height = height * dpr;
        canvas.style.width = width + 'px';
        canvas.style.height = height + 'px';

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = 1;
        ctx.fillStyle = 'rgba(0, 0, 0, 1)';
        ctx.fillRect(0, 0, width, height);
      }

      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

      container.addEventListener('pointermove', (e) => {
        const rect = container.getBoundingClientRect();
        mouseX = e.clientX - rect.left;
        mouseY = e.clientY - rect.top;
        hasMouse = true;
      });

      container.addEventListener('touchmove', (e) => {
        e.preventDefault();
        const rect = container.getBoundingClientRect();
        const t = e.touches[0];
        mouseX = t.clientX - rect.left;
        mouseY = t.clientY - rect.top;
        hasMouse = true;
      }, { passive: false });

      container.addEventListener('touchstart', (e) => {
        const rect = container.getBoundingClientRect();
        const t = e.touches[0];
        mouseX = t.clientX - rect.left;
        mouseY = t.clientY - rect.top;
        hasMouse = true;
      });

      container.addEventListener('touchend', () => {
        hasMouse = false;
      });

      container.addEventListener('pointerleave', () => {
        if (!isMobile) hasMouse = false;
      });

      function animate() {
        requestAnimationFrame(animate);
        if (!width || !height) return;

        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = isMobile ? 0.15 : 0.25; // thinner fog on mobile
        ctx.fillStyle = 'rgba(0, 0, 0, 1)';
        ctx.fillRect(0, 0, width, height);
        ctx.globalAlpha = 1;

        if (hasMouse) {
          ctx.globalCompositeOperation = 'destination-out';

          const baseRadius = isMobile ? 110 : 70; // larger reveal on mobile
          const jitter = 4 * (Math.random() - 0.5);
          const radius = baseRadius + jitter;

          const grad = ctx.createRadialGradient(
            mouseX, mouseY, 0,
            mouseX, mouseY, radius
          );
          grad.addColorStop(0, 'rgba(0, 0, 0, 1)');
          grad.addColorStop(1, 'rgba(0, 0, 0, 0)');

          ctx.fillStyle = grad;
          ctx.beginPath();
          ctx.arc(mouseX, mouseY, radius, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.globalCompositeOperation = 'source-over';
      }

      animate();
    });
  </script>
</body>
</html>
